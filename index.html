<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私人播客</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }
.player-wrap { max-width: 640px; margin: 0 auto; padding: 2rem 1rem; }
.pod-header { display: flex; align-items: center; gap: 16px; margin-bottom: 1.5rem; }
.pod-icon { width: 60px; height: 60px; border-radius: 14px; background: #dbeafe; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.pod-icon svg { width: 30px; height: 30px; }
.pod-title { font-size: 20px; font-weight: 600; }
.pod-author { font-size: 13px; color: #666; margin-top: 3px; }
.now-playing { background: #fff; border: 1px solid #e5e5e5; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; }
.np-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.np-title { font-size: 15px; font-weight: 500; margin-bottom: 14px; line-height: 1.4; }
.progress-bar { width: 100%; height: 4px; accent-color: #2563eb; cursor: pointer; }
.time-row { display: flex; justify-content: space-between; font-size: 12px; color: #888; margin: 6px 0 14px; }
.controls { display: flex; align-items: center; justify-content: center; gap: 24px; }
.ctrl-btn { background: none; border: none; cursor: pointer; padding: 8px; color: #444; border-radius: 50%; font-size: 13px; display: flex; align-items: center; gap: 4px; }
.ctrl-btn:hover { background: #f0f0f0; }
.play-btn { width: 48px; height: 48px; border-radius: 50%; background: #2563eb; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.play-btn:hover { background: #1d4ed8; }
.ep-list { display: flex; flex-direction: column; gap: 8px; }
.ep-item { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background 0.15s; }
.ep-item:hover { background: #f9f9f9; }
.ep-item.active { border-color: #2563eb; background: #eff6ff; }
.ep-num { font-size: 12px; color: #aaa; min-width: 20px; text-align: center; }
.ep-info { flex: 1; min-width: 0; }
.ep-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ep-date { font-size: 12px; color: #888; margin-top: 2px; }
.ep-dur { font-size: 12px; color: #aaa; flex-shrink: 0; }
.loading { text-align: center; padding: 2rem; color: #888; font-size: 14px; }
.speed-btn { background: #f0f0f0; border: none; border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer; color: #444; }
.speed-btn:hover { background: #e0e0e0; }
</style>
</head>
<body>
<div class="player-wrap">
  <div class="pod-header">
    <div class="pod-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="1.5">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
      </svg>
    </div>
    <div>
      <div class="pod-title" id="pod-title">載入中...</div>
      <div class="pod-author" id="pod-author"></div>
    </div>
  </div>

  <div class="now-playing">
    <div class="np-label">正在播放</div>
    <div class="np-title" id="np-title">請選擇一集開始收聽</div>
    <input type="range" class="progress-bar" id="progress" value="0" min="0" max="100" step="1" oninput="seek(this.value)">
    <div class="time-row">
      <span id="cur-time">0:00</span>
      <span id="dur-time">0:00</span>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="skip(-15)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 .49-4.28"/></svg>
        15
      </button>
      <button class="play-btn" id="play-btn" onclick="togglePlay()">
        <svg id="play-icon" width="22" height="22" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
      </button>
      <button class="ctrl-btn" onclick="skip(15)">
        15
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-.49-4.28"/></svg>
      </button>
      <button class="speed-btn" onclick="cycleSpeed()" id="speed-btn">1x</button>
    </div>
  </div>

  <div class="ep-list" id="ep-list">
    <div class="loading">載入集數中...</div>
  </div>
</div>

<audio id="audio"></audio>

<script>
const FEED = 'https://linkuenrong.github.io/podcast/feed.xml';
const PROXY = 'https://api.allorigins.win/get?url=';
const audio = document.getElementById('audio');
const speeds = [1, 1.25, 1.5, 2];
let speedIdx = 0;
let episodes = [];
let currentIdx = -1;

async function loadFeed() {
  try {
    const res = await fetch(PROXY + encodeURIComponent(FEED));
    const data = await res.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, 'text/xml');
    const ch = xml.querySelector('channel');
    document.getElementById('pod-title').textContent = ch.querySelector('title')?.textContent || '我的播客';
    document.title = ch.querySelector('title')?.textContent || '私人播客';
    document.getElementById('pod-author').textContent = ch.querySelector('author')?.textContent || '';
    const items = [...xml.querySelectorAll('item')];
    episodes = items.map((item, i) => ({
      title: item.querySelector('title')?.textContent || '第 ' + (i+1) + ' 集',
      url: item.querySelector('enclosure')?.getAttribute('url') || '',
      date: item.querySelector('pubDate')?.textContent || '',
      desc: item.querySelector('description')?.textContent || ''
    }));
    renderList();
  } catch(e) {
    document.getElementById('ep-list').innerHTML = '<div class="loading">無法載入集數，請稍後再試</div>';
    document.getElementById('pod-title').textContent = '私人播客';
  }
}

function renderList() {
  const list = document.getElementById('ep-list');
  if (!episodes.length) { list.innerHTML = '<div class="loading">尚無集數</div>'; return; }
  list.innerHTML = episodes.map((ep, i) => `
    <div class="ep-item ${i===currentIdx?'active':''}" onclick="playEp(${i})">
      <div class="ep-num">${i+1}</div>
      <div class="ep-info">
        <div class="ep-name">${ep.title}</div>
        <div class="ep-date">${ep.date ? new Date(ep.date).toLocaleDateString('zh-TW') : ''}</div>
      </div>
    </div>
  `).join('');
}

function playEp(idx) {
  currentIdx = idx;
  const ep = episodes[idx];
  document.getElementById('np-title').textContent = ep.title;
  audio.src = ep.url;
  audio.playbackRate = speeds[speedIdx];
  audio.play();
  setPlayIcon(true);
  renderList();
}

function togglePlay() {
  if (!audio.src) return;
  if (audio.paused) { audio.play(); setPlayIcon(true); }
  else { audio.pause(); setPlayIcon(false); }
}

function setPlayIcon(playing) {
  document.getElementById('play-icon').innerHTML = playing
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="5,3 19,12 5,21"/>';
}

function skip(sec) { audio.currentTime = Math.max(0, (audio.currentTime||0) + sec); }

function cycleSpeed() {
  speedIdx = (speedIdx + 1) % speeds.length;
  audio.playbackRate = speeds[speedIdx];
  document.getElementById('speed-btn').textContent = speeds[speedIdx] + 'x';
}

function fmtTime(s) {
  s = Math.floor(s || 0);
  const m = Math.floor(s / 60);
  return m + ':' + String(s % 60).padStart(2, '0');
}

function seek(val) {
  if (audio.duration) audio.currentTime = (val / 100) * audio.duration;
}

audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? Math.round((audio.currentTime / audio.duration) * 100) : 0;
  document.getElementById('progress').value = pct;
  document.getElementById('cur-time').textContent = fmtTime(audio.currentTime);
  document.getElementById('dur-time').textContent = fmtTime(audio.duration);
});

audio.addEventListener('ended', () => {
  setPlayIcon(false);
  if (currentIdx < episodes.length - 1) playEp(currentIdx + 1);
});

loadFeed();
</script>
</body>
</html>
